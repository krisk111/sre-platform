replicaCount: 2

image:
  repository: worker-service
  tag: "local"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8001

resources:
  requests: { cpu: "100m", memory: "128Mi" }
  limits: { cpu: "500m", memory: "256Mi" }

livenessProbe:
  httpGet: { path: /health, port: 8001 }
  initialDelaySeconds: 10

readinessProbe:
  httpGet: { path: /health, port: 8001 }
  initialDelaySeconds: 5